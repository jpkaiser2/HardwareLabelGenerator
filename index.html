<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardware Label Generator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="panel no-print">
      <h1>Hardware Label Generator</h1>
      <p>© 2026 <a href="https://jacobkaiserman.com" target="_blank" style="color: #4a4a4a;">Jacob Kaiserman</a></p>
      <p>Create printable labels for organizing hardware.</p>

      <form id="labelForm">
        <div class="label-manager">
          <div class="form-group">
            <label for="labelPicker">Active Label</label>
            <select id="labelPicker" name="labelPicker"></select>
          </div>
          <div class="mini-actions">
            <button type="button" id="addLabelBtn">+ Add</button>
            <button type="button" id="duplicateLabelBtn">Duplicate</button>
            <button type="button" id="removeLabelBtn">Remove</button>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="standard">Standard</label>
            <select id="standard" name="standard">
              <option value="metric" selected>Metric</option>
              <option value="sae">SAE</option>
            </select>
          </div>
          <div class="form-group">
            <label for="type">Hardware Type</label>
            <select id="type" name="type">
              <option value="screw" selected>Screw</option>
              <option value="setScrew">Set Screw</option>
              <option value="nut">Nut</option>
              <option value="washer">Washer</option>
              <option value="bearing">Bearing</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="size"><span id="sizeLabel">Size</span></label>
            <select id="size" name="size">
              <option value="M2">M2</option>
              <option value="M2.5">M2.5</option>
              <option value="M3">M3</option>
              <option value="M4" selected>M4</option>
              <option value="M5">M5</option>
              <option value="M6">M6</option>
              <option value="M8">M8</option>
            </select>
          </div>
          <div class="form-group">
            <label for="location">Location</label>
            <input id="location" name="location" type="text" value="" placeholder="Optional (e.g., Drawer A-3)">
          </div>
        </div>

        <div class="row config-group" data-types="screw">
          <div class="form-group">
            <label for="head">Head Type</label>
            <select id="head" name="head">
              <option value="pan" selected>Pan</option>
              <option value="socketCap">Socket Cap</option>
              <option value="fillister">Fillister</option>
              <option value="flat">Flat</option>
              <option value="flat82">82° Flat</option>
              <option value="hex">Hex</option>
              <option value="hexWasher">Hex Washer</option>
              <option value="oval">Oval</option>
              <option value="round">Round</option>
              <option value="roundWasher">Round Washer</option>
              <option value="trim">Trim</option>
              <option value="wafer">Wafer</option>
            </select>
          </div>
          <div class="form-group">
            <label for="drive">Drive Type</label>
            <select id="drive" name="drive">
              <option value="phillips" selected>Phillips</option>
              <option value="hex">Hex</option>
              <option value="torx">Torx</option>
              <option value="securityTorx">Security Torx</option>
              <option value="slotted">Slotted</option>
            </select>
          </div>
        </div>

        <div class="row config-group" data-types="screw">
          <div class="form-group">
            <label for="length"><span id="lengthLabel">Length (mm)</span></label>
            <input id="length" name="length" type="number" min="1" value="12">
          </div>
          <div class="form-group">
            <label for="pitch"><span id="pitchLabel">Pitch (mm)</span></label>
            <input id="pitch" name="pitch" type="number" step="0.05" value="0.7">
          </div>
        </div>

        <div class="form-group config-group" data-types="screw">
          <label for="endType">Tip / End Type</label>
          <select id="endType" name="endType">
            <option value="pointed" selected>Pointed</option>
            <option value="flat">Flat</option>
          </select>
        </div>

        <div class="form-group config-group" data-types="screw">
          <label class="check-label" for="screwHeadless">
            <input id="screwHeadless" name="screwHeadless" type="checkbox">
            Headless
          </label>
        </div>

        <div class="row config-group" data-types="setScrew">
          <div class="form-group">
            <label for="setScrewDrive">Drive Type</label>
            <select id="setScrewDrive" name="setScrewDrive">
              <option value="hex" selected>Hex</option>
              <option value="torx">Torx</option>
              <option value="securityTorx">Security Torx</option>
              <option value="slotted">Slotted</option>
              <option value="phillips">Phillips</option>
            </select>
          </div>
          <div class="form-group">
            <label for="setScrewPoint">Point Style</label>
            <select id="setScrewPoint" name="setScrewPoint">
              <option value="cup" selected>Cup Point</option>
              <option value="cone">Cone Point</option>
              <option value="flat">Flat Point</option>
              <option value="dog">Dog Point</option>
            </select>
          </div>
        </div>

        <div class="row config-group" data-types="setScrew">
          <div class="form-group">
            <label for="setScrewLength"><span id="setScrewLengthLabel">Length (mm)</span></label>
            <input id="setScrewLength" name="setScrewLength" type="number" min="1" value="8">
          </div>
          <div class="form-group">
            <label for="setScrewPitch"><span id="setScrewPitchLabel">Pitch (mm)</span></label>
            <input id="setScrewPitch" name="setScrewPitch" type="number" step="0.05" value="0.7">
          </div>
        </div>

        <div class="row config-group" data-types="nut">
          <div class="form-group">
            <label for="nutWidthAcrossFlats">Width Across Flats (mm)</label>
            <input id="nutWidthAcrossFlats" name="nutWidthAcrossFlats" type="number" step="0.1" value="7">
          </div>
          <div class="form-group">
            <label for="nutThickness">Thickness (mm)</label>
            <input id="nutThickness" name="nutThickness" type="number" step="0.1" value="3.2">
          </div>
        </div>

        <div class="form-group config-group" data-types="nut">
          <label class="check-label" for="nutLock">
            <input id="nutLock" name="nutLock" type="checkbox">
            Lock Nut
          </label>
        </div>

        <div class="row config-group" data-types="washer">
          <div class="form-group">
            <label for="washerID">Inner Diameter / ID (mm)</label>
            <input id="washerID" name="washerID" type="number" step="0.1" value="4.3">
          </div>
          <div class="form-group">
            <label for="washerOD">Outer Diameter / OD (mm)</label>
            <input id="washerOD" name="washerOD" type="number" step="0.1" value="9">
          </div>
        </div>

        <div class="form-group config-group" data-types="washer">
          <label for="washerThickness">Thickness (mm)</label>
          <input id="washerThickness" name="washerThickness" type="number" step="0.1" value="0.8">
        </div>

        <div class="row config-group" data-types="bearing">
          <div class="form-group">
            <label for="bearingPreset">Bearing Preset</label>
            <select id="bearingPreset" name="bearingPreset">
              <option value="custom" selected>Custom</option>
              <option value="608">608 (8 × 22 × 7)</option>
              <option value="625">625 (5 × 16 × 5)</option>
              <option value="626">626 (6 × 19 × 6)</option>
              <option value="627">627 (7 × 22 × 7)</option>
              <option value="6000">6000 (10 × 26 × 8)</option>
              <option value="6001">6001 (12 × 28 × 8)</option>
              <option value="6002">6002 (15 × 32 × 9)</option>
              <option value="6003">6003 (17 × 35 × 10)</option>
              <option value="6004">6004 (20 × 42 × 12)</option>
              <option value="6200">6200 (10 × 30 × 9)</option>
              <option value="6201">6201 (12 × 32 × 10)</option>
              <option value="6202">6202 (15 × 35 × 11)</option>
              <option value="6203">6203 (17 × 40 × 12)</option>
              <option value="R188">R188 (1/4 × 1/2 × 3/16)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="bearingSeal">Seal Type</label>
            <select id="bearingSeal" name="bearingSeal">
              <option value="open" selected>Open</option>
              <option value="shielded">Shielded (ZZ)</option>
              <option value="sealed">Sealed (2RS)</option>
            </select>
          </div>
        </div>

        <div class="row config-group" data-types="bearing">
          <div class="form-group">
            <label for="bearingID">Inner Diameter / ID (mm)</label>
            <input id="bearingID" name="bearingID" type="number" step="0.1" value="8">
          </div>
          <div class="form-group">
            <label for="bearingOD">Outer Diameter / OD (mm)</label>
            <input id="bearingOD" name="bearingOD" type="number" step="0.1" value="22">
          </div>
        </div>

        <div class="form-group config-group" data-types="bearing">
          <label for="bearingWidth">Width (mm)</label>
          <input id="bearingWidth" name="bearingWidth" type="number" step="0.1" value="7">
        </div>

        <div class="row">
          <div class="form-group">
            <label for="material">Material (optional)</label>
            <input id="material" name="material" type="text" value="" placeholder="Optional (e.g., Steel)">
          </div>
          <div class="form-group">
            <label for="finish">Finish (optional)</label>
            <input id="finish" name="finish" type="text" value="" placeholder="Optional (e.g., Zinc)">
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="vendor">Vendor (optional)</label>
            <input id="vendor" name="vendor" type="text" value="" placeholder="Optional vendor name">
          </div>
          <div class="form-group">
            <label for="sku">SKU (optional)</label>
            <input id="sku" name="sku" type="text" value="" placeholder="Optional part/SKU code">
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="averyTemplate">Avery Template</label>
            <select id="averyTemplate" name="averyTemplate">
              <option value="single" selected>Single Label (4in × 2.25in)</option>
              <option value="5160">Avery 5160 (30 labels)</option>
              <option value="5163">Avery 5163 (10 labels)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="labelQuantity">Qty On Sheet</label>
            <input id="labelQuantity" name="labelQuantity" type="number" min="1" value="1">
          </div>
        </div>

        <div class="actions">
          <button type="button" id="printBtn" class="primary">Print Label</button>
          <button type="reset">Reset</button>
        </div>

        <div class="actions">
          <button type="button" id="exportJsonBtn">Export JSON</button>
        </div>
      </form>
    </aside>

    <main class="preview-area">
      <div id="sheetPreview" class="sheet-preview"></div>
      <p id="sheetNotice" class="sheet-notice"></p>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
